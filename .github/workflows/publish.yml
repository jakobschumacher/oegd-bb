name: Build and Deploy via SFTP

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        timeout-minutes: 10
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR || secrets.FTP_REMOTEDIR || secrets.FTP_REMOTE_PATH || vars.FTP_REMOTE_DIR || vars.FTP_REMOTEDIR || vars.FTP_REMOTE_PATH }}
        run: |
          if [ -z "$FTP_REMOTE_DIR" ]; then
            echo "Missing remote dir. Set one of: FTP_REMOTE_DIR, FTP_REMOTEDIR or FTP_REMOTE_PATH (Secret or Variable)."
            exit 1
          fi
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "sftp://$FTP_HOST:$FTP_PORT" -c "set sftp:auto-confirm yes; set cmd:fail-exit yes; set cmd:interactive false; set net:timeout 20; set net:max-retries 2; set net:reconnect-interval-base 5; mirror -R --delete --overwrite --only-newer _site/ \"${FTP_REMOTE_DIR}\""
